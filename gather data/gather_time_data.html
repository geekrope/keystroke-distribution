<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>nauka</title>
</head>

<body>
    <script src="../utils/tokenizer.js">
    </script>
    <script>
        const text1 = `В программировании точность важнее скорости, хотя ритм решает все.\n` +
            `Каждое нажатие на клавишу оставляет след в цифровом пространстве.\n` +
            `Биометрия - это не только отпечатки пальцев или сетчатка глаза.\n` +
            `Твой стиль набора текста так же уникален, как и твоя подпись.\n` +
            `Алгоритмы замеряют миллисекунды между буквами "а" и "п".\n` +
            `Интересно наблюдать, как меняется темп, когда ты устаешь или нервничаешь.\n` +
            `Если ты введешь этот текст полностью, данных хватит на нейросеть!\n` +
            `Давай добавим немного цифр для разнообразия: 123, 456, 7890.\n` +
            `Спецсимволы тоже важны: @, #, $, %, ^, &, *, ( , ).\n` +
            `Как быстро ты сможешь переключаться между регистрами через Shift?\n` +
            `Многие люди делают паузу перед тем, как поставить точку или запятую.\n` +
            `Это когнитивная задержка: мозг завершает одну мысль и готовит другую.\n` +
            `Твой скрипт сейчас записывает каждый такой микро-выбор в CSV файл.\n` +
            `Представь, что по этим данным можно определить твое настроение сегодня.\n` +
            `Уставший человек тянет клавиши дольше, а профи чеканит как пулемет.\n` +
            `Мы создаем карту твоего поведения, превращая время в чистые числа.\n` +
            `Посмотри на свои графики: видишь ли ты там свои привычки и ошибки?\n` +
            `Часто ли ты промахиваешься мимо клавиш, когда пытаешься ускориться?\n` +
            `Исправление ошибок через Backspace - это тоже часть твоего профиля.\n` +
            `Но в этом тесте мы фиксируем только идеальный, чистый путь.\n` +
            `Осталось совсем немного, чтобы добить нужный объем символов.\n` +
            `Финальный рывок: проверяем стабильность твоего правого мизинца на Enter!\n` +
            `Три, два, один, завершаем этот масштабный эксперимент прямо сейчас.`

        const text2 = `The seed does not see the flower when it begins to break.\n` +
            `"It only knows the pressure of the earth and the pull of the light."\n` +
            `\n` +
            `Growth is often a series of quiet, invisible fractures.\n` +
            `Each crack in the shell is not a failure, but a liberation.\n` +
            `\n` +
            `"To stay the same is to stay small," the wind whispers.\n` +
            `So we stretch, we reach, and we become what we were meant to be.`;

        const text = text2

        function init(text) {
            text_area = document.getElementById('input')
            content = ``

            for (let ind = 0; ind < text.length; ind++) {
                let c = text[ind]
                if (c == '\n') {
                    content += `<br id = "c${ind}">`
                }
                else {
                    if (c == ' ') {
                        c = '&nbsp;'
                    }
                    content += `<span style = 'outline-style: solid; font-size: 36px; outline-width: 1px; padding: 2px; margin: 3px; display: inline-block;' id = "c${ind}">${c}</span>`
                }
            }

            text_area.innerHTML = content
        }

        let ptr = 0
        let timestamp = -1
        let lastToken = -1
        let delays = []
        let transitions = []

        let typos = {}

        window.onload = () => {
            init(text)
        }

        window.onkeydown = (ev) => {
            if ([' ', 'Enter', 'ArrowUp', 'ArrowDown'].includes(ev.key)) {
                ev.preventDefault();
            }
        }

        window.onkeyup = (ev) => {
            char = ev.key

            if (char == 'Enter') {
                char = '\n'
            }

            let token = getToken(char);

            if (token == -1) {
                return;
            }

            const trueChar = text[ptr]

            if (token == 0 && getToken(trueChar) == 0) {                
                if (typos[trueChar] === undefined) {
                    typos[trueChar] = [char]
                }
                else {
                    typos[trueChar].push(char)
                }
            }

            if (trueChar === char) {
                if (timestamp === -1) {
                    timestamp = Date.now();
                } else {
                    currentTime = Date.now()

                    delays.push(currentTime - timestamp)
                    transitions.push(`${lastToken}-${token}`)

                    timestamp = currentTime
                }

                lastToken = token

                document.getElementById(`c${ptr}`).style.color = 'blue';
                document.getElementById(`c${ptr}`).style.fontWeight = 'normal';

                if (ptr < text.length + 1) {
                    document.getElementById(`c${ptr + 1}`).style.fontWeight = 'bold';
                }

                ptr++;

                if (document.getElementById(`c${ptr}`)) {
                    document.getElementById(`c${ptr}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else {
                console.log(char)
                document.getElementById(`c${ptr}`).style.color = 'red';
            }
        }

        function exportTimingData() {
            let csvContent = "delay,transition\n";

            for (let ind = 0; ind < transitions.length; ind++) {
                csvContent += `${delays[ind]},${transitions[ind]}\n`;
            }

            exportCSV(csvContent)
        }

        function exportAccurayData() {
            let csvContent = "original,typed\n";

            for (const [key, value] of Object.entries(typos)) {
                console.log(key);

                value.forEach(element => {
                    csvContent += `${key},${element}\n`;
                });                
            }

            exportCSV(csvContent)
        }

        function exportCSV(csvContent) {
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);

            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "my_typing_data.csv");
            link.style.visibility = 'hidden';

            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>

    <button onclick="exportTimingData()">export timing data</button>
    <button onclick="exportAccurayData()">export accuracy data</button>
    <div id="input">
        <span>a</span><span>b</span><span>c</span>
    </div>
</body>

</html>
